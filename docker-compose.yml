services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: presupuesto
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget123
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U budget -d presupuesto']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      NODE_ENV: production
    ports:
      - '${BACKEND_PORT:-3457}:3457'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-3456}:80'

volumes:
  pgdata:
